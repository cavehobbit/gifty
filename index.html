<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title> Grifty </title>
		<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600800&display=swap" rel="stylesheet">
		<style>
        :root { --mc: #ffafd2; --glass: rgba(255,255,255,0.7); 
			--txt: #1d1d1f; --bgp: #fbbcd5; --btn-bg: #ffafd2; }
        body.parents { --mc: #ffea70; --bgp: #f0d54a; }
		body.grandparents { --mc: #a7f3d0; --bgp: #6ee7b7; }
        body.bestfriend { --mc: #1e3a8a; 
			--bgp: #1e40af; --txt: #fff; --glass: rgba(255,255,255,0.1); }
        body.partner { --mc: #ff4d6d; 
		--bgp: #c9184a; --txt: #000; --glass: rgba(255,255,255,0.8); }
        * { margin:0; padding:0; box-sizing:border-box; }
		body { font-family: 'Plus Jakarta Sans', sans-serif; 
		background: var(--mc); color: var(--txt);
		min-height: 100vh; display: flex; 
		justify-content: center; align-items: center; 
		transition: 0.5s; overflow: hidden; }
		.wrapper-bg { 
			position: fixed; inset: -50%; width: 200%; 
			height: 200%; 
			background-image: linear-gradient(30deg, var(--bgp) 12%, transparent 12.5%, transparent 87%, var(--bgp) 87.5%, var(--bgp)), linear-gradient(150deg, var(--bgp) 12%, transparent 12.5%, transparent 87%, var(--bgp) 87.5%, var(--bgp)); 
			background-size: 80px 140px; transform: rotate(-15deg); 
			z-index: -2; opacity: 0.4; }
        .spot { position: fixed; background: white; 
			filter: blur(35px); border-radius: 50%; z-index: -1; 
			width: 160px; height: 160px; }
        .app-container { display: flex; 
			align-items: flex-start; gap: 40px;
			transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .main-box { width: 400px; 
			background: var(--glass); 
			backdrop-filter: blur(20px); 
			border-radius: 30px; padding: 25px; 
			box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
			border: 1px solid rgba(255,255,255,0.4); } #guide { 
				position: fixed; z-index: 99; display: flex; 
			flex-direction: column; align-items: center; 
			transition: 0.7s cubic-bezier(0.4, 0, 0.2, 1); }
        .g-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .g-corner { bottom: 20px; right: 20px; align-items: flex-end; }
        .bubble { background: white; padding: 15px; 
			border-radius: 20px; font-size: 0.9rem; 
			margin-bottom: 10px; max-width: 250px; opacity: 0; 
			transition: 0.3s; color: #000; 
			box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .avatar { width: 80px; height: 80px; 
			background: white; border-radius: 50%; 
			display: flex; align-items: center; 
			justify-content: center; font-size: 1rem; 
			border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
			color:#000; }
        .step { display: none; } .step.active { display: block; animation: slideUp 0.4s; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } }
        .btn { width: 100%; 
			background: var(--btn-bg, #fff); color: #000; 
			border: 3px solid #000; padding: 15px; 
			border-radius: 15px; font-weight: 800; 
			cursor: pointer; box-shadow: 4px 4px 0 #000; 
			margin-top: 10px; }
        .who-btn { width: 100%;
			background: #fff; border: 2px solid transparent; padding: 12px; 
			border-radius: 12px; margin-bottom: 5px; 
			text-align: left; cursor: pointer; color:#000; font-weight: 600; }
        .who-btn.sel { border-color: #000; }
        #resSide { width: 400px; display: none; opacity: 0;
			transition: 0.5s; }
        .gift-card { background: #fff; 
			padding: 20px; border-radius: 20px;
			margin-bottom: 10px; position: relative; 
			color:#000; border: 3px solid transparent; }
        .dots { position: absolute; top: 10px; 
			right: 10px; cursor: pointer; font-size: 1.2rem; }
        input, select { width: 100%; padding: 12px; 
			border-radius: 12px; border: 1px solid #ccc; margin: 10px 0; 
			font-family: inherit; }
        #pageShadow { position: fixed; inset: 0; 
			background: rgba(0,0,0,0.7); 
			backdrop-filter: blur(8px); z-index: 90; 
			transition: 0.5s; }


    	</style>
	</html>
	<!-- black n pink default theme -->
	<body class="theme-default">
		<div class="wrapper-bg"></div> 
		<div class="spot" style="top: 10%; left: 10%; "></div>
		<div class="spot" style="bottom: 10%; right: 10%;"></div>
		<div id="pageShadow"></div>
		<div id="guide" class="g-center">
			<div id="bubble" class="bubble"></div>
			<div class="avatar">DOG</div>
			<button id="introBtn" class="btn" style="width:auto; padding: 10px 30px;">Continue</button>
		</div>

		<div class="app-container" id="app">
			<div id="s1" class="step active"><label>Who for?</label>
                <button class="who-btn" onclick="setWho(this,'parents')">Parents</button>
                <button class="who-btn" onclick="setWho(this,'grandparents')">Grandparents</button>
                <button class="who-btn" onclick="setWho(this,'friend')">Friend</button>
                <button class="who-btn" onclick="setWho(this,'partner')">Partner</button>
                <button class="who-btn" onclick="setWho(this,'teacher')">Teacher</button>
                <button class="btn" onclick="next(2)">Continue</button>
            </div>
			<div id="s2" class="step">
				<label>Age?</label>
				<input type="number" id="age" 
				placeholder="Enter age...">
				<button class="btn" onclick="next(3)">Continue</button></div>
            <div id="s3" class="step">
				<label>Gift Type</label><select id="type">
					<option>Cozy</option><option>Funny</option>
					<option>Cool Tech</option></select>
                <label>Budget</label>
				<select id="budget"><option value="25">$0 - $25</option>
					<option value="75">$25 - $75</option></select>
                <button class="btn" onclick="find()">Find Gifts</button>
            </div>
        </div>
        <div id="resSide"></div>
    </div>
    <script>
		let step=0, who="", tTimer;
        function type(t){
            const b=document.getElementById('bubble'); 
			clearInterval(tTimer); b.textContent=""; 
			b.classList.toggle('active', !!t);
            if(!t) return;
            let i=0; tTimer = setInterval(()=>{ b.textContent += t[i++]; if(i>=t.length) clearInterval(tTimer); }, 40);
        }
		//dialogues
        window.onload=()=>type("I know choosing gifts can be difficult");
        document.getElementById('introBtn').onclick=()=>{
            if(step===0){ step++; type("let's help you find something!!"); }
            else { type(""); document.getElementById('introBtn').style.display="none"; document.getElementById('pageShadow').style.display="none"; document.getElementById('guide').className="g-corner"; }
        };
        function setWho(el, v){
            document.querySelectorAll('.who-btn').forEach(b=>b.classList.remove('sel')); el.classList.add('sel'); who=v;
            document.body.className = (v === 'teacher') ? '' : 'theme-' + v; // Teacher = default midnight
            if(v==='partner') document.body.className='partner'; if(v==='friend') document.body.className='theme-friends';
        }

		function next(n){
            if(n===2 && !['friend','partner'].includes(who)) n=3;
            document.querySelectorAll('.step').forEach(s=>s.classList.remove('active')); document.getElementById('s'+n).classList.add('active');
        }
        function find(){
            type("ooo these look great"); document.getElementById('app').style.transform="translateX(-18%)";
            const r=document.getElementById('resSide'); r.style.display="block"; setTimeout(()=>r.style.opacity="1",100);
            r.innerHTML = `

			<div class="gift-card">
                    <div class="dots" onclick="alert('Link: amazon.com')">⋮</div>
                    <h4>Sloth Coffee Mug</h4><p>Funny and cozy accessory.</p>
                    <div style="display:flex;gap:10px;margin-top:10px;">
                        <button class="btn" style="padding:8px;font-size:0.7rem;
						" onclick="type('They will LOVE this!!! :3')">Wrap</button>
						<button class="btn" style="padding:8px;font-size:0.7rem;background:#eee" onclick="this.parentNode.parentNode.remove();type('Keep searching!')">Cancel</button>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
