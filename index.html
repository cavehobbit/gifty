<!DOCTYPE html>
<html lang="en">
<body style="background:#ffafd2; font-family:sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; overflow:hidden; margin:0;">
    <div style="position:fixed; background:#fff; filter:blur(40px); width:150px; height:150px; top:10%; left:10%; border-radius:50%;"></div>
    <div id="guide" style="position:fixed; z-index:9; transition:0.7s; display:flex; flex-direction:column; align-items:center; top:50%; left:50%; transform:translate(-50%,-50%);">
        <div id="bubble" style="background:#fff; padding:10px; border-radius:15px; margin-bottom:10px; font-weight:bold; visibility:hidden;"></div>
        <div style="width:80px; height:80px; background:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:30px; box-shadow:0 5px 15px rgba(0,0,0,0.2)">tempo</div>
        <button id="cont" onclick="go()" style="margin-top:10px; padding:10px 20px; cursor:pointer; border-radius:10px; border:2px solid #000; background:#fff;">Continue</button>
    </div>
    <div id="wrap" style="display:flex; gap:30px; transition:0.8s; align-items:flex-start; transform:translateY(20px); opacity:0;">
        <div style="background:rgba(255,255,255,0.7); backdrop-filter:blur(20px); padding:25px; border-radius:30px; width:380px; border:1px solid #fff;">
            <h1>Gifty.</h1>
            <div id="s1"><h3>Who for?</h3><button onclick="st(2)" style="width:100%; padding:12px; margin:5px 0; border-radius:10px; border:none; cursor:pointer;">Friend</button></div>
            <div id="s2" style="display:none;"><h3>Age?</h3><input type="number" id="age" style="width:100%; padding:10px; border-radius:10px;"><button onclick="st(3)" style="width:100%; margin-top:10px; padding:10px;">Next</button></div>
            <div id="s3" style="display:none;"><h3>Type?</h3><select id="type" style="width:100%; padding:10px;"><option>Cozy</option><option>Funny</option></select><button onclick="find()" style="width:100%; margin-top:15px; padding:15px; background:#ffafd2; border:2px solid #000; font-weight:bold; cursor:pointer;">FIND GIFTS</button></div>
        </div>
        <div id="res" style="width:380px; display:none;"></div>
    </div>
    <script>
        let step = 0;
        const msg = ["I know choosing gifts can be difficult", "Let's help you find something!!"];
        const gifts = [{n:"Sloth Mug", i:"🦥", url:"https://amazon.com"}, {n:"Self Care Kit", i:"🧼", url:"https://amazon.com"}];
        function say(t) { 
            const b = document.getElementById('bubble'); b.textContent = ""; b.style.visibility = t?"visible":"hidden"; 
            let i=0; let it = setInterval(() => { b.textContent += t[i++]; if(i>=t.length) clearInterval(it); }, 40);
        }
        window.onload = () => say(msg[0]);
        function go() {
            if(step === 0) { step++; say(msg[1]); } 
            else { 
                document.getElementById('guide').style = "position:fixed; bottom:20px; right:20px; display:flex; align-items:flex-end;"; 
                document.getElementById('cont').style.display = "none";
                document.getElementById('wrap').style.opacity = "1"; say("");
            }
        }
        function st(n) { document.getElementById('s1').style.display=document.getElementById('s2').style.display='none'; document.getElementById(`s${n}`).style.display='block'; }
        function find() {
            document.getElementById('wrap').style.transform = "translateX(-15%)";
            const r = document.getElementById('res'); r.style.display = 'block'; r.innerHTML = "";
            say("ooo these look great");
            gifts.forEach((g,i) => {
                let c = document.createElement('div'); c.style = "background:#fff; padding:15px; border-radius:20px; margin-bottom:10px; position:relative; cursor:pointer;";
                c.innerHTML = `<div onclick="this.parentNode.style.border='2px solid #000'">${g.i} <b>${g.n}</b></div><div style="margin-top:10px;"><button onclick="say('They will love it!')" style="background:#ffafd2; border:1px solid #000; border-radius:5px; padding:5px 10px;">Wrap</button> <button onclick="this.parentNode.parentNode.remove(); say('Keep searching!')" style="padding:5px 10px; border-radius:5px; border:1px solid #000;">Cancel</button></div>`;
                r.appendChild(c);
            });
        }
    </script>
</body>
</html>
