<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gifty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>

        :root {
            /* normal theme */
            --main-color: #0a0a0b; 
            --accent: #ffafd2;
            --glass: rgba(28, 28, 30, 0.8);
            --border: rgba(255, 255, 255, 0.15);
            --txt: #ffffff;
            --btn-txt: #000000;
            --bg-pat: #1a1a1c;
        }

        /* changing themes
		#ffafd2 #1d1d1f  #fbbcd5
        #ffea70  #f0d54a #a7f3d0 #1e3a8a  #1e40af
		*/
        body.theme-friend { --main-color: #ffafd2; --txt: #1d1d1f; --btn-txt: #1d1d1f; --glass: rgba(255, 255, 255, 0.7); --border: rgba(255,255,255,0.6); --accent: #ffafd2; --bg-pat: #fbbcd5; }
        body.theme-parents { --main-color: #ffea70; --txt: #1d1d1f; --btn-txt: #1d1d1f; --glass: rgba(255, 255, 255, 0.7); --border: rgba(255,255,255,0.6); --accent: #ffea70; --bg-pat: #f0d54a; }
        body.theme-grandparents { --main-color: #a7f3d0; --txt: #1d1d1f; --btn-txt: #1d1d1f; --glass: rgba(255, 255, 255, 0.7); --border: rgba(255,255,255,0.6); --accent: #a7f3d0; --bg-pat: #6ee7b7; }
        body.theme-bestfriend { --main-color: #1e3a8a; --txt: #ffffff; --btn-txt: #ffffff; --glass: rgba(255, 255, 255, 0.1); --border: rgba(255,255,255,0.2); --accent: #1e3a8a; --bg-pat: #1e40af; }
        body.theme-partner { --main-color: #ff4d6d; --txt: #000000; --btn-txt: #000000; --glass: rgba(255, 255, 255, 0.8); --border: rgba(255,255,255,0.4); --accent: #ff4d6d; --bg-pat: #c9184a; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--main-color);
            color: var(--txt);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            transition: all 0.7s ease;
        }

        /* Wrapper backgrond for normal theme */
        .wrapper-bg {
            position: fixed;
            inset: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(30deg, var(--bg-pat) 12%, transparent 12.5%, transparent 87%, var(--bg-pat) 87.5%, var(--bg-pat)),
                              linear-gradient(150deg, var(--bg-pat) 12%, transparent 12.5%, transparent 87%, var(--bg-pat) 87.5%, var(--bg-pat));
            background-size: 80px 140px;
            transform: rotate(-15deg);
            z-index: -2;
            opacity: 0.4;
        }
        .spot { position: fixed; background: white; filter: blur(40px); z-index: -1; opacity: 0.9; transition: 0.7s; }
        .circle-spot { border-radius: 50%; width: 180px; height: 180px; display: none; }
        .heart-spot {
            width: 100px; height: 100px; background: white; display: none;
            clip-path: path('M12 4.435c-1.989-5.399-12-4.597-12 3.568 0 4.06 3.06 6.06 12 14.125 8.94-8.065 12-10.065 12-14.125 0-8.165-10.011-8.967-12-3.568z');
        }
        body.theme-partner .heart-spot { display: block; }
        body.theme-partner .heart-spot.s1 { top: 50%; left: 15%; transform: translateY(-50%) scale(7.5); }
        body.theme-partner .heart-spot.s2 { top: 50%; right: 15%; transform: translateY(-50%) scale(7.5); }
        body.theme-partner .circle-spot { display: none; }

        .s1 { top: 10%; left: 10%; }
        .s2 { bottom: 15%; right: 10%; }

        .app-container {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            max-width: 1150px;
            gap: 40px;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .app-container.results-active { transform: translateX(-18%); }

        .main-box { width: 100%; max-width: 420px; flex-shrink: 0; transition: all 0.8s ease; }
        header h1 { font-size: 4rem; font-weight: 800; text-align: center; margin-bottom: 20px; letter-spacing: -3px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
        }

        #resultsSide { width: 420px; opacity: 0; display: none; transition: opacity 0.5s ease; padding-top: 105px; }

        /* guide movements */
        #guideWrapper {
            position: fixed; z-index: 3000; display: flex; flex-direction: column; align-items: center;
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1); pointer-events: none;
        }
        .g-center { top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .g-corner { bottom: 30px; right: 30px; top: auto; left: auto; transform: translate(0, 0); align-items: flex-end; }

        .bubble {
            background: white; padding: 36px 50px; border-radius: 25px; font-size: 2rem; font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-width: 520px; opacity: 0; margin-bottom: 30px;
            text-align: center; color: #000; min-height: 100px; display: block; order: -1;
        }
        .g-center .bubble { padding: 24px 35px; font-size: 1.4rem; min-height: 60px; max-width: 380px; }
        .bubble.active { opacity: 1; }
        .g-corner .bubble { border-radius: 25px 25px 0px 25px; font-size: 1.1rem; text-align: left; padding: 16px 20px; max-width: 220px; min-height: auto; }

        .avatar {
            width: 220px; height: 220px; background: transparent; border-radius: 0; display: flex; align-items: center; justify-content: center;
            border: none; box-shadow: none; pointer-events: auto; overflow: hidden; cursor: pointer;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .g-corner .avatar { width: 180px; height: 180px; }

        #pageShadow { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 2000; transition: 0.5s; }
        #pageShadow.hidden { opacity: 0; visibility: hidden; }

        .step { display: none; }
        .step.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } }

        .who-btn { 
            width: 100%; background: #ffffff; border: 2px solid transparent; padding: 14px; border-radius: 15px; 
            cursor: pointer; font-weight: 700; margin-bottom: 6px; text-align: left; color: #000;
        }
        .who-btn.selected { border-color: #000; background: #fafafa; }

        input, select { 
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: 20px; outline: none; font-size: 1rem; background: #2c2c2e; color: #fff;
        }
        body[class*="theme-"] select, body[class*="theme-"] input { background: #fff; color: #000; border: 1px solid #ccc; }

        /* with black shadow */
        .btn { 
            width: 100%; background: var(--accent); color: var(--btn-txt); border: 3px solid #000; 
            padding: 18px; border-radius: 20px; font-weight: 800; cursor: pointer; 
            box-shadow: 6px 6px 0px #000; transition: 0.2s; text-transform: uppercase;
        }
        .btn:hover { transform: translate(-3px, -3px); box-shadow: 9px 9px 0px #000; }
        .btn:disabled { background: #3a3a3c !important; border-color: #515154; color: #7b7b80; box-shadow: none; }

        /* another featuree (panic button) */
        .panic-link {
            display: block; text-align: center; margin-top: 20px; font-size: 0.8rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; text-decoration: underline;
            opacity: 0.7; transition: opacity 0.2s; color: var(--txt);
        }
        .panic-link:hover { opacity: 1; }

        /* Gift Cards + a wraping feature */
        .gift-card {
            background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; position: relative; border: 3px solid transparent; transition: 0.3s; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1); color: #000;
        }
        .gift-card.selected { border-color: #000; }
        .dots { position: absolute; top: 15px; right: 15px; cursor: pointer; font-size: 1.5rem; }
        .menu-dropdown { position: absolute; top: 45px; right: 15px; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.15); display: none; z-index: 100; }
        
        .gift-actions { display: flex; gap: 10px; margin-top: 15px; }
        .mini-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #000; font-weight: 800; font-size: 0.8rem; cursor: pointer; text-transform: uppercase;}
        .wrap-btn { background: var(--accent); color: var(--btn-txt); }
        .cancel-btn { background: #f2f2f7; color: #000; }

        #wrapOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .box-wrap { font-size: 8rem; position: relative; }
        .gift-tag { font-size: 1.2rem; background: white; color: black; padding: 10px; border-radius: 10px; position: absolute; top: -40px; animation: dropIn 1s forwards; font-weight: 800;}
        @keyframes dropIn { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(100px); opacity: 0; } }
        
        .bypass { display:block; text-align:center; font-size:0.8rem; text-decoration:underline; cursor:pointer; margin-bottom:15px; color: var(--txt) }
    </style>
</head>

                <div class="who-list">
                    <button class="who-btn" data-val="parents">Parents</button>

            </div>

                    <option value="Cozy">Cozy</option>
                    <option value="Social">Social</option>
                    <option value="Cool Tech">Cool Tech</option>
                    <option value="Self Care">Self Care</option>
                    <option value="Sporty">Sporty</option>
                    <option value="Chill">Chill</option>
                    <option value="Funny">Funny</option>
                    <option value="Light-hearted">Light-hearted</option>
                </select>
                <label>Budget</label>
                <select id="budget">
                    <option value="low">$0 - $25</option>
                    <option value="mid">$25 - $75</option>
                    <option value="high">$100+</option>
                </select>
                <button class="btn" onclick="find()">Find Gifts</button>
                <span class="panic-link" id="panicBtn" onclick="panic()">I'm desperate</span>
            </div>
        </div>
    </div>
    <div id="resultsSide"><div id="giftList"></div></div>
</div>

<script>
    let introStep = 0, who = "", tTimer, currentGiftIndex = 0, foxAnimInterval = null;
    const bubble = document.getElementById('bubble'), wrapper = document.getElementById('guideWrapper'), introBtn = document.getElementById('introBtn'), foxImg = document.querySelector('#guideAvatar img');

    // custom typing logic
    function type(text) {
        clearInterval(tTimer); bubble.classList.remove('active'); bubble.textContent = "";
        if (!text) return;
        setTimeout(() => {
            bubble.classList.add('active'); let i = 0;
            // intrval logic
            tTimer = setInterval(() => { bubble.textContent += text.charAt(i); i++; if (i >= text.length) clearInterval(tTimer); }, 60);
        }, 150);
    }

    function startFoxAnimation() {
        let foxState = 1;
        foxAnimInterval = setInterval(() => {
            foxImg.src = foxState === 1 ? 'fox1.png' : 'fox2.png';
            foxState = foxState === 1 ? 2 : 1;
        }, 2000);
    }

    function stopFoxAnimation() {
        if (foxAnimInterval) clearInterval(foxAnimInterval);
        foxImg.src = 'fox1.png';
    }

    window.onload = () => { type("I know choosing gifts can be difficult"); startFoxAnimation(); };

    introBtn.onclick = () => {
        if (introStep === 0) { introStep++; type("let's help you find something!!"); }
        else { 
            type(""); 
            stopFoxAnimation();
            introBtn.style.display = "none"; 
            document.getElementById('pageShadow').classList.add('hidden'); 
            wrapper.className = "g-corner"; // move dog immediatly
        }
    };

    document.querySelectorAll('.who-btn').forEach(b => {
        b.onclick = function() {
            document.querySelectorAll('.who-btn').forEach(btn => btn.classList.remove('selected'));
            this.classList.add('selected'); who = this.dataset.val; document.getElementById('s1Next').disabled = false;
            document.body.className = (who === 'other') ? '' : 'theme-' + who;

    function renderList(filtered, isPanic = false) {
        const list = document.getElementById('giftList'); list.innerHTML = "";
        const dataSet = filtered.slice(currentGiftIndex, currentGiftIndex + 2);
        
        dataSet.forEach((item, idx) => {
            const cardId = isPanic ? `p-${idx}` : idx;
            const card = document.createElement('div'); card.className = 'gift-card'; card.id = `gift-${cardId}`;
            card.onclick = () => { document.querySelectorAll('.gift-card').forEach(c => c.classList.remove('selected')); card.classList.add('selected'); };
            card.innerHTML = `<button class="dots" onclick="toggleMenu(event,'${cardId}')">⋮</button>
                <div class="menu-dropdown" id="menu-${cardId}"><a href="${item.url}" target="_blank" style="font-size:0.75rem; font-weight:800; color:#007aff; text-decoration:none;">View Link</a></div>
                <h4 style="font-weight:800;">${item.n}</h4><p style="font-size:0.8rem; color:#666;">${item.d}</p>
                <div class="gift-actions">
                    <button class="mini-btn wrap-btn" onclick="wrap(event,'${item.n}')">Wrap</button>
                    <button class="mini-btn cancel-btn" onclick="cancel(event,'${cardId}')">Cancel</button>
                </div>`;
            list.appendChild(card);
        });
        if(!isPanic) currentGiftIndex = (currentGiftIndex + 2 >= filtered.length) ? 0 : currentGiftIndex + 2;
    }

    function toggleMenu(e, id) { e.stopPropagation(); document.querySelectorAll('.menu-dropdown').forEach(d => d.style.display = 'none'); document.getElementById(`menu-${id}`).style.display = 'block'; }
    function wrap(e, n) { e.stopPropagation(); document.getElementById('wrapLabel').textContent = n; document.getElementById('wrapOverlay').style.display = 'flex'; type("I'm sure they're gonna LOVE this!!! come back soon :3"); setTimeout(() => document.getElementById('wrapOverlay').style.display = 'none', 2500); }
    function cancel(e, id) { e.stopPropagation(); document.getElementById(`gift-${id}`).remove(); foxImg.src = 'fox3.png'; type("It's okayy keep searching you'll find something better"); }
    window.onclick = () => document.querySelectorAll('.menu-dropdown').forEach(d => d.style.display = 'none');

    document.getElementById('guideAvatar').addEventListener('click', () => {
        foxImg.src = 'fox4.png';
        setTimeout(() => { foxImg.src = 'fox1.png'; }, 300);
    });

    function goPersona() { document.getElementById('s2').classList.remove('active'); document.getElementById('step-3').classList.add('active'); }
    document.getElementById('age').oninput = () => document.getElementById('ageNext').disabled = document.getElementById('age').value === '';
    document.getElementById('ageNext').onclick = goPersona;
    document.getElementById('s1Next').onclick = () => { document.getElementById('s1').classList.remove('active'); document.getElementById('s2').classList.add('active'); };

    function find() {
        const p = document.getElementById('type').value, b = document.getElementById('budget').value, ageVal = parseInt(document.getElementById('age').value) || 0;
        let filtered = giftDatabase.filter(g => {
            const mWho = g.r.includes(who), mType = g.t.includes(p);
            let mBud = (b === 'low') ? g.p <= 25 : (b === 'mid') ? (g.p > 25 && g.p <= 75) : g.p > 75;
            // check aray for later
            return mWho && mType && mBud && (!g.minAge || ageVal >= g.minAge) && (!g.maxAge || ageVal <= g.maxAge);
        });

        if (!filtered.length) { type("Nothing found. Try a different combo!"); return; }
        type("ooo these look great"); 
        document.getElementById('appContainer').classList.add('results-active');
        const rs = document.getElementById('resultsSide'); rs.style.display = "block"; setTimeout(() => rs.style.opacity = "1", 100);
        renderList(filtered);
    }

    function panic() {
        const panicPool = [
            {n: "High-Quality Throw Blanket", d: "Universal comfort.", url: "https://amazon.com/s?k=blanket"},
            {n: "Premium Candle", d: "Smells like effort.", url: "https://amazon.com/s?k=candle"},
            {n: "Aesthetic Lamp", d: "Lights up the room.", url: "https://amazon.com/s?k=lamp"}
        ];
        type("Ok ok don't worry, these always work!!");
        document.getElementById('appContainer').classList.add('results-active');
        const rs = document.getElementById('resultsSide'); rs.style.display = "block"; setTimeout(() => rs.style.opacity = "1", 100);
        renderList(panicPool, true);
    }
